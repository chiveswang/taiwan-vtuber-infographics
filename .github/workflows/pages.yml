name: Deploy dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}site/
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate public data
        run: python scripts/validate_public_data.py

      - name: Validate public asset index
        run: python scripts/validate_public_index.py

      - name: Regenerate committed charts
        run: python scripts/generate_sample_charts.py

      - name: Validate static dashboard
        run: python scripts/validate_static_site.py

      - name: Ensure generated files are committed
        run: git diff --exit-code

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
